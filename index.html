<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bingo — Menú Principal</title>
  <meta name="description" content="Tablero de proyección y control para bingo B-I-N-G-O. Menú principal.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <main class="app home-layout">
    <div class="home-container">
      <!-- Logo and branding large -->
      <div class="home-brand">
        <img class="home-logo" id="homeLogo" src="./assets/logo.jpeg" alt="Logo">
        <div class="home-brand-text">
          <span class="home-kicker" id="homeKicker">Renovación Universitaria</span>
          <h1 class="home-title" id="homeAppTitle">BINGO</h1>
          <span class="home-subtitle" id="homeSubtitle">Universidad Privada de Tacna</span>
        </div>
      </div>

      <!-- Mode selection info -->
      <div class="home-mode-info">
        <span class="mode-info-label">Modo predeterminado:</span>
        <span class="mode-info-value" id="homeCurrentModeLabel">—</span>
        <button class="action-link" id="homeChangeModeBtn" type="button">Cambiar modo</button>
      </div>

      <!-- Active Game Alert Box -->
      <div class="home-active-panel" id="homeActiveGamePanel">
        <div class="active-badge">PARTIDA EN CURSO</div>
        <p class="active-summary" id="homeActiveGameSummary">Cargando...</p>
        <button class="home-btn continue-btn" id="homeContinueBtn" type="button">
          Continuar Partida
        </button>
      </div>

      <!-- Home Actions -->
      <div class="home-actions">
        <button class="home-btn primary-btn" id="homeStartBtn" type="button">
          Nueva Partida
        </button>
        <button class="home-btn secondary-btn" id="homeHistoryBtn" type="button">
          Historial
        </button>
      </div>

      <!-- Last Game Panel / Summary (Daily Stats) -->
      <div class="home-summary-panel" id="homeSummaryPanel">
        <div class="summary-title" id="homeLastGameTitle">Último juego de hoy</div>
        <div class="summary-content" id="homeSummaryContent">
          <!-- Dynamically populated -->
        </div>
      </div>
    </div>
  </main>

  <!-- Mode Selector Overlay -->
  <div class="mode-overlay" id="modeOverlay"></div>

  <!-- Confirm Overwrite Modal -->
  <div class="confirm-modal-overlay" id="confirmOverwriteOverlay">
    <div class="confirm-modal">
      <h2>Partida en curso</h2>
      <p id="confirmOverwriteMessage">Ya hay una partida en curso. ¿Qué deseas hacer?</p>
      <div class="confirm-modal-buttons">
        <button class="confirm-action-btn continue" id="confirmContinueBtn">Continuar partida</button>
        <button class="confirm-action-btn overwrite" id="confirmOverwriteBtn">Iniciar nueva</button>
        <button class="confirm-action-btn cancel" id="confirmCancelBtn">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- App Logic (ES Module) -->
  <script type="module" src="./src/menu.js"></script>
</body>
</html>
